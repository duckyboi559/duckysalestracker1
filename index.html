<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Pancake Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h1>Mini Pancakes</h1>
<p class="subtitle">Tap Counter</p>

<div class="grid">

<div class="tile" onclick="changeCount('stack20',1)">
<h2>Stack’d 20</h2>
<p>$10</p>
<div class="count" id="stack20Count">0</div>
</div>

<div class="tile" onclick="changeCount('stack25',1)">
<h2>Stack’d 25</h2>
<p>$12</p>
<div class="count" id="stack25Count">0</div>
</div>

<div class="tile" onclick="changeCount('stack30',1)">
<h2>Stack’d 30</h2>
<p>$15</p>
<div class="count" id="stack30Count">0</div>
</div>

<div class="tile" onclick="changeCount('your20',1)">
<h2>Your Way 20</h2>
<p>$8</p>
<div class="count" id="your20Count">0</div>
</div>

<div class="tile" onclick="changeCount('your25',1)">
<h2>Your Way 25</h2>
<p>$10</p>
<div class="count" id="your25Count">0</div>
</div>

<div class="tile" onclick="changeCount('your30',1)">
<h2>Your Way 30</h2>
<p>$12</p>
<div class="count" id="your30Count">0</div>
</div>

</div>

<div class="totalBox">
<h2>Total</h2>
<div id="grandTotal">$0</div>
</div>

<div class="dateBox">
Today: <span id="todayDate"></span>
</div>

<div class="buttons">
<button onclick="saveDay()" class="save">Save Day</button>
<button onclick="resetDay()" class="reset">Reset</button>
</div>

<div class="history">
<h2>Previous Days</h2>
<div id="historyList"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
